<!DOCTYPE html>
<html>
<head>
    <title>AI MedAssist Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <h1>AI MedAssist Pro</h1>
    <input id="name" placeholder="Name">
    <input id="age" type="number" placeholder="Age">
    <input id="symptom" placeholder="Enter Symptoms (e.g. fever)">
    <button onclick="analyzeHealth()">🔍 Analyze Health</button>

    <h3>Dashboard</h3>
    <p>Disease: <span id="disease">Waiting...</span></p>
    <p>Confidence: <span id="confidence">--</span></p>
    <p>Recommendation: <span id="recommend">--</span></p>

    <div style="width: 400px;">
        <canvas id="probabilityChart"></canvas>
        <canvas id="trendChart"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
