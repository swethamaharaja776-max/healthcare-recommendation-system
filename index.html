<!DOCTYPE html>
<html>
<head>
    <title>AI MedAssist Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <h2>Patient Input</h2>
    <input id="name" placeholder="Name">
    <input id="symptom" placeholder="Symptoms">
    <button onclick="analyzeHealth()">🔍 Analyze Health</button>

    <h3>Result</h3>
    <p>Disease: <span id="disease">--</span></p>
    <p>Confidence: <span id="confidence">--</span></p>
    <p>Recommendation: <span id="recommend">--</span></p>

    <canvas id="probabilityChart" width="400" height="200"></canvas>
    
    <script src="script.js"></script>
</body>
</html>
