<!DOCTYPE html>
<html>
<head>
    <title>AI MedAssist Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family: Arial;
            margin:40px;
            background:#f2f7ff;
        }

        input,button{
            padding:10px;
            margin:5px;
        }

        button{
            background:#1565c0;
            color:white;
            border:none;
            cursor:pointer;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            width:400px;
        }
    </style>

</head>

<body>

<div class="box">

<h2>🤖 AI MedAssist Pro</h2>


<input id="name" placeholder="Patient Name">

<br>

<input id="symptom" placeholder="Enter Symptoms">

<br>

<button onclick="analyzeHealth()">
🔍 Analyze Health
</button>


<h3>Health Report</h3>


<p>
Disease :
<span id="disease">--</span>
</p>


<p>
Confidence :
<span id="confidence">--</span>
</p>


<p>
Risk :
<span id="risk">--</span>
</p>


<p>
Recommendation :
<span id="recommend">--</span>
</p>



<canvas id="probabilityChart"></canvas>


</div>



<script src="script.js"></script>

</body>
</html>
